services:
  postgres:
    image: postgres:16
    container_name: pge-rides-postgres
    environment:
      POSTGRES_DB: pgerides
      POSTGRES_USER: pgeridesdb
      POSTGRES_PASSWORD: mydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: pge-rides-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7
    container_name: pge-rides-redis
    ports:
      - "6379:6379"

volumes:
  pgdata: